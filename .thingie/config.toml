models_file = ".thingie/models.json"

skill_directories = [
  ".thingie/skills"
]

exclude_files = [
  ".thingie/skills/**/*"
]

[lsp.ruby]
command = ["bundle", "exec", "rake"]
extensions = [".rb", ".rake"]

# Critic pass: review runs on the model from the workflow (vars.LLM_MODEL via
# OpenRouter); the verify pass re-checks each surviving finding on a stronger
# model. Same provider/key (OpenRouter), so the slug is provider-prefixed.
[verify]
enabled = true
model = "deepseek/deepseek-v4-pro"

# Auto-Approving PRs
#
# Disabled in Thingie's own repository: we don't want Thingie auto-approving
# pull requests to Thingie itself. Changes here should always get a human
# review. The remaining settings are kept for reference/documentation.

[approve]
enabled = false
dry_run = false
max_changes = 500
max_severity = 3
protected_paths = [
  ".github/*",
  "Gemfile",
  "Gemfile.lock",
  "thingie.gemspec",
  ".thingie/**/*"
]
