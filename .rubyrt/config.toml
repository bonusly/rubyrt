[lsp.ruby]
command = ["bundle", "exec", "rake"]
extensions = [".rb", ".rake"]

# Critic pass: review runs on the model from the workflow (vars.LLM_MODEL via
# OpenRouter); the verify pass re-checks each surviving finding on a stronger
# model. Same provider/key (OpenRouter), so the slug is provider-prefixed.
[verify]
enabled = true
model = "z-ai/glm-5.2"

# Auto-Approving PRs

[approve]
enabled = true
dry_run = false
max_changes = 500
max_severity = 3
protected_paths = [
  ".github/*",
  "Gemfile",
  "Gemfile.lock",
  "rubyrt.gemspec"
]
