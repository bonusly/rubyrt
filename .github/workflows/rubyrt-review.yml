name: "RubyRT Review"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request number"
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/create-github-app-token@v2
        id: app_token
        with:
          org: bonusly
          repo: rubyrt
          app-id: ${{ vars.RUBYRT_APP_ID }}
          private-key: ${{ secrets.RUBYRT_APP_PRIVATE_KEY }}
      - name: Run RubyRT review
        uses: ./.github/actions/rubyrt
        env:
          PR_NUMBER_FROM_WORKFLOW_DISPATCH: ${{ github.event.inputs.pr_number }}
        with:
          api_key: ${{ secrets.LLM_API_KEY }}
          model: ${{ vars.LLM_MODEL }}
          provider: ${{ vars.LLM_PROVIDER }}
          rubyrt_version: local
          # Optional: a PAT/App token so stale review threads can be auto-resolved
          # (the default GITHUB_TOKEN cannot). Resolution is skipped if unset.
          resolve_token: ${{ steps.app_token.outputs.token }}
