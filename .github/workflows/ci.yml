name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  specs:
    name: Specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run specs
        run: bundle exec rspec
