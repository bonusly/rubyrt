name: "RubyRT Review"
description: "Run RubyRT AI code review on pull requests"
branding:
  icon: "star"
  color: "red"
inputs:
  api_key:
    description: "LLM API key"
    required: true
  ruby_version:
    description: "Ruby version to install for running RubyRT"
    required: false
    default: "3.4"
  api_base:
    description: "OpenAI-compatible API base URL"
    required: false
  model:
    description: "LLM model name"
    required: false
    default: "gpt-4o"
  provider:
    description: "LLM provider (e.g. openai, anthropic, gemini)"
    required: false
    default: "openai"
  output_dir:
    description: "Directory for review reports"
    required: false
    default: "."
  rubyrt_version:
    description: >-
      RubyRT gem version to install. Use 'local' to build and install from the
      checked-out repo, or 'skip' to install nothing (when rubyrt_command
      already provides RubyRT, e.g. via your Gemfile).
    required: false
    default: ">= 0"
  rubyrt_command:
    description: >-
      Command used to invoke the RubyRT CLI. Defaults to 'rubyrt'. Set to
      something like 'bundle exec rubyrt' or 'direnv exec . rubyrt' for setups
      that need it.
    required: false
    default: "rubyrt"
  github_token:
    description: >-
      Token used to post review comments. Falls back to the workflow
      GITHUB_TOKEN when unset (comments appear as "github-actions"). Pass a
      GitHub App installation token (e.g. from actions/create-github-app-token)
      to post under the app's name and avatar instead. Needs pull-requests write.
    required: false
  resolve_token:
    description: >-
      Personal access token used to resolve stale review threads (GraphQL
      resolveReviewThread). Must be a user PAT with pull-requests write —
      GITHUB_TOKEN and GitHub App installation tokens cannot call this mutation.
      Optional; resolving is skipped when unset.
    required: false
runs:
  using: "composite"
  steps:
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ inputs.ruby_version }}
    - name: Install RubyRT
      shell: bash
      env:
        RUBYRT_VERSION: ${{ inputs.rubyrt_version }}
        RUBYRT_CMD: ${{ inputs.rubyrt_command }}
      run: |
        if [ "$RUBYRT_VERSION" = "skip" ]; then
          echo "Skipping install; using '$RUBYRT_CMD' to run RubyRT."
        elif [ "$RUBYRT_VERSION" = "local" ]; then
          gem build rubyrt.gemspec -o rubyrt.gem
          gem install ./rubyrt.gem
        else
          gem install rubyrt -v "$RUBYRT_VERSION"
        fi
    - name: Determine base ref
      id: base
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        if [ -n "$BASE_SHA" ]; then
          git fetch --no-tags --depth=1 origin "$BASE_SHA" || true
          echo "ref=$BASE_SHA" >> "$GITHUB_OUTPUT"
        else
          # Non-PR run: ensure HEAD~1 exists even on a shallow checkout.
          git fetch --no-tags --deepen=1 || true
          echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
        fi
    - name: Run RubyRT review
      shell: bash
      env:
        LLM_API_KEY: ${{ inputs.api_key }}
        LLM_API_BASE: ${{ inputs.api_base }}
        LLM_MODEL: ${{ inputs.model }}
        LLM_PROVIDER: ${{ inputs.provider }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
        BASE_REF: ${{ steps.base.outputs.ref }}
        RUBYRT_CMD: ${{ inputs.rubyrt_command }}
      # Unquoted so multi-word commands (e.g. "bundle exec rubyrt") word-split.
      run: $RUBYRT_CMD review --output "$OUTPUT_DIR" --what HEAD --against "$BASE_REF"
    - name: Post review to GitHub
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token || github.token }}
        RUBYRT_RESOLVE_TOKEN: ${{ inputs.resolve_token }}
        OUTPUT_DIR: ${{ inputs.output_dir }}
        RUBYRT_CMD: ${{ inputs.rubyrt_command }}
      run: |
        REPORT="$OUTPUT_DIR/code-review-report.md"
        if [ -f "$REPORT" ]; then
          $RUBYRT_CMD github-comment --md-report-file "$REPORT"
        else
          echo "No report at $REPORT; skipping comment."
        fi
      if: always()
    - name: Upload reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rubyrt-review-results
        path: |
          ${{ inputs.output_dir }}/code-review-report.json
          ${{ inputs.output_dir }}/code-review-report.md
