plugins:
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "pkg/**/*"

Style/Documentation:
  Enabled: true

Metrics/MethodLength:
  Max: 65

Metrics/ClassLength:
  Max: 120

# Keyword arguments are self-documenting and don't suffer the positional
# argument confusion this cop targets.
Metrics/ParameterLists:
  CountKeywordArgs: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Layout/LineLength:
  Max: 120
