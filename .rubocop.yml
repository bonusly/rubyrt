plugins:
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  Exclude:
    - "vendor/**/*"
    - "tmp/**/*"
    - "pkg/**/*"

Style/Documentation:
  Enabled: true

# `pr` is idiomatic for a pull request throughout the GitHub integration.
# The rest are RuboCop's defaults, which an AllowedNames override would drop.
Naming/MethodParameterName:
  AllowedNames:
    - as
    - at
    - by
    - cc
    - db
    - id
    - if
    - in
    - io
    - ip
    - of
    - "on"
    - os
    - pr
    - to
    - up

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Max: 15

Metrics/MethodLength:
  Max: 65

Metrics/PerceivedComplexity:
  Max: 15

Metrics/ClassLength:
  Max: 120

# Keyword arguments are self-documenting and don't suffer the positional
# argument confusion this cop targets.
Metrics/ParameterLists:
  CountKeywordArgs: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Layout/LineLength:
  Max: 120

RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Max: 20
