# Default Thingie project configuration.
# Copy this to .thingie/config.toml in your project to customize. Project values
# are merged on top of these defaults; prompt_vars are deep-merged.

# Directories to scan for skill fragments (.md files) that get injected into
# the review prompt as additional rules.
skill_directories = [".agents", ".claude", ".cursor", "skills", ".thingie/skills"]

# Glob patterns for files or directories to exclude from review.
exclude_files = [
  "Gemfile.lock",
  "yarn.lock",
  "package-lock.json",
  "tmp/*",
  "node_modules/*",
  "log/*"
]

# Number of retries for transient LLM failures.
retries = 3

# Maximum number of concurrent file reviews (uses fibers).
max_concurrent_tasks = 10

# Timeout (in seconds) for a single LLM request, including connection and
# response. Set lower to fail fast on unreachable providers.
request_timeout = 120

# Path to a log file for RubyLLM request logging. Leave empty to log to stdout.
# Set to a file path to persist LLM request/response details for debugging.
log_file = ""

# Log level for RubyLLM: "debug", "info", "warn", "error", or "fatal".
# Use "debug" to see full request/response bodies.
log_level = "info"

# Default model if none is provided via environment.
model = "gpt-5.4-nano"

# LLM provider to use. Must match a provider supported by RubyLLM
# (e.g. openai, anthropic, gemini, ollama, deepseek, openrouter, mistral,
# perplexity, xai, azure, bedrock, vertexai, gpustack).
provider = "openai"
# Path to a local RubyLLM models registry (JSON). When set and the file exists,
# reviews load model metadata from it instead of the (potentially stale) file
# shipped with the ruby_llm gem. Run `thingie models` to refresh and persist it.
# Supports `~` and relative paths (resolved against the project root). Leave
# empty to use the shipped registry.
models_file = ""

# Language servers the LLM can consult for extra context (definitions of
# classes/methods referenced in the diff) during review. Disabled unless at
# least one server is configured below. Each entry's `command` is launched in
# the reviewed project's root, so use that project's own LSP binary. Uncomment
# to enable Ruby (requires ruby-lsp in the reviewed project):
#   [lsp.ruby]
#   command = ["ruby-lsp"]
#   extensions = [".rb", ".rake"]

# Issue severity scale shown to the LLM in the review prompt.
# Keys are numeric levels (as strings), values are labels.
[severity_scale]
1 = "Critical"
2 = "High"
3 = "Medium"
4 = "Low"

# Confidence scale shown to the LLM in the review prompt.
# Keys are numeric levels (as strings), values are labels.
[confidence_scale]
1 = "Highest, 100% confidence"
2 = "Very High"
3 = "High"
4 = "Medium (should not be reported)"

[prompt_vars]
self_id = """
You are a subsystem of an AI-powered software platform, specifically tasked
with performing expert code reviews. Act as a senior, highly experienced
software engineer with deep Ruby and Rails knowledge.
"""

requirements = """
Issues are labeled by their severity

# Critical

- Inconsistency in module, class or method naming.
- Lack of DRY principle enforcement
- Lack of tests for new features

# High

- Lack of updated documentation or inconsistent documentation
- Lack of updated tests for updated features

# Medium

- Consistency in terminology, tense, and naming across the codebase.
- Unclear or incorrect English in documentation
"""

json_requirements = """
- IMPORTANT: RESPOND ONLY WITH VALID JSON. Your response will be parsed
  programmatically.
- Do not include any additional text or explanation outside the specified
  format.
"""

[post_process]
# Thresholds applied to issues after the LLM returns them. Lower numbers are
# more confident / more severe, so an issue is kept only when its confidence
# and severity are at or below these maximums.
max_confidence = 1
max_severity = 3

[verify]
# Critic / challenge pass: after filtering, re-examine each surviving finding
# with a fresh, adversarially-framed LLM call that must ground the issue in the
# actual code (or drop it). Cuts false positives and hallucinations. It only
# runs on findings that passed the thresholds above, so cost scales with finding
# count, not file size. Fail-open: a finding is kept if the critic can't run.
enabled = true
# Optional: run the critic on a stronger model than the review (same provider
# and API key). Leave empty to reuse the review model.
# model = "claude-opus-4.8"

[approve]
# Auto-approve the PR when every rule below passes. Disabled by default. The
# approval is submitted as the resolve-token user (THINGIE_RESOLVE_TOKEN) when
# one is configured so it counts toward branch protection, else the main token.
# Requires the workflow's `pull-requests: write` permission (already needed for
# comments).
enabled = false
# Block approval when additions + deletions exceed this. Also blocks approval
# when GitHub doesn't report the size (fails safe).
max_changes = 500
# Issues at or below this severity number (1=Critical) block approval — both new
# findings from this run and unresolved/self-resolved findings from prior runs.
max_severity = 3
# A Thingie finding only counts as "resolved" for approval if a user who is
# neither the PR author nor a contributor resolved it; otherwise approval is
# blocked. Add this label to a PR to skip auto-approval entirely.
skip_label = "thingie-skip-approve"
# Glob patterns (matched like exclude_files) that block auto-approval when any
# changed file matches — e.g. billing code or sensitive config that always
# wants human eyes. Changes to .thingie/config.toml are always blocked. By
# default the whole .thingie/ directory is protected so Thingie never
# auto-approves changes to its own config, skills, or review prompts. NOTE:
# setting protected_paths in a project replaces this default, so include
# ".thingie/**/*" there too if you override it.
protected_paths = [".thingie/**/*"]
# Evaluate the rules and log the decision without approving or dismissing.
dry_run = false
# When set to an "org/team-slug" (e.g. "bonusly/pr-auto-approval"), only
# auto-approve PRs whose author is a member of that GitHub team — a controlled
# allowlist managed from GitHub org settings. Empty means any author is eligible
# (subject to the other rules). A non-member is skipped (not blocked), so an
# existing human approval is left intact. Reading team membership needs a token
# with read:org, which the Actions GITHUB_TOKEN usually lacks; set
# THINGIE_RESOLVE_TOKEN to a PAT with read:org. Membership that can't be
# determined fails safe (not eligible).
approval_team = ""
# Other required checks Thingie does not evaluate but that still gate merge (e.g.
# a security scan, the test suite). Listed in the approval comment so it's clear
# Thingie's approval isn't the only gate — these do not affect Thingie's decision.
external_checks = []
