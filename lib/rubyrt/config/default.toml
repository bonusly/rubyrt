# Default RubyRT project configuration.
# Copy this to .rubyrt/config.toml in your project to customize. Project values
# are merged on top of these defaults; prompt_vars are deep-merged.

# Triggers that cause the bot to respond when mentioned in PR comments.
mention_triggers = ["rubyrt", "bot", "ai", "/check"]

# Collapse previous RubyRT review comments in the GitHub PR thread before
# posting new ones.
collapse_previous_code_review_comments = true

# Auxiliary files to provide as extra context during review (paths relative to
# the project root).
aux_files = []

# Directories to scan for skill fragments (.md files) that get injected into
# the review prompt as additional rules.
skill_directories = [".agents", ".claude", ".cursor", "skills", ".rubyrt/skills"]

# Glob patterns for files or directories to exclude from review.
exclude_files = [
  "Gemfile.lock",
  "yarn.lock",
  "package-lock.json",
  "tmp/*"
]

# A reasonable default for request timeout


# Number of retries for transient LLM failures.
retries = 3

# Maximum number of concurrent file reviews.
max_concurrent_tasks = 5

# Timeout (in seconds) for a single LLM request, including connection and
# response. Set lower to fail fast on unreachable providers.
request_timeout = 120

# Path to a log file for RubyLLM request logging. Leave empty to log to stdout.
# Set to a file path to persist LLM request/response details for debugging.
log_file = ""

# Log level for RubyLLM: "debug", "info", "warn", "error", or "fatal".
# Use "debug" to see full request/response bodies.
log_level = "info"

# Default model if none is provided via environment.
model = "gpt-5.4-nano"

# LLM provider to use. Must match a provider supported by RubyLLM
# (e.g. openai, anthropic, gemini, ollama, deepseek, openrouter, mistral,
# perplexity, xai, azure, bedrock, vertexai, gpustack).
provider = "openai"

[prompt_vars]
self_id = """
You are a subsystem of an AI-powered software platform, specifically tasked
with performing expert code reviews. Act as a senior, highly experienced
software engineer with deep Ruby and Rails knowledge.
"""

requirements = """
- Treat unclear or incorrect English in user-facing strings as a critical defect.
- Enforce consistency in terminology, tense, and naming across the codebase.
"""

summary_requirements = ""

json_requirements = """
- IMPORTANT: RESPOND ONLY WITH VALID JSON. Your response will be parsed
  programmatically.
- Do not include any additional text or explanation outside the specified
  format.
"""

[post_process]
# Ruby expression used to filter issues after the LLM returns them.
# Each issue can be referenced as `issue`. Return true to keep the issue.
filter = """
issue['confidence'] == 1 && issue['severity'] <= 3
"""
